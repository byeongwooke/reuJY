  <script>
    /* ══════════════════════════════════════════
       DUAL HORIZON ROLLING BANNER ENGINE
       ══════════════════════════════════════════ */
    class RollingBanner {
      constructor(containerId, images, intervalTime = 7000) {
        this.container = document.querySelector(`#${containerId} .banner-slides`);
        this.images = images;
        this.currentIndex = 0;
        this.intervalTime = intervalTime;
        this.timer = null;
        this.isTransitioning = false;
        
        // Drag/swipe state
        this.startX = 0;
        this.currentX = 0;
        this.isDragging = false;
        this.dragThreshold = 80;
        
        this.init();
      }
      
      init() {
        if (!this.images || this.images.length === 0) return;
        
        this.currentSlide = this.createSlideElement(this.images[this.currentIndex]);
        this.currentSlide.classList.add('active', 'ken-burns');
        this.container.appendChild(this.currentSlide);
        
        this.startAutoPlay();
        this.bindEvents();
      }
      
      createSlideElement(src) {
        const slide = document.createElement('div');
        slide.className = 'banner-slide';
        slide.style.backgroundImage = `url('${src}')`;
        return slide;
      }
      
      startAutoPlay() {
        this.stopAutoPlay();
        this.timer = setInterval(() => {
          this.next();
        }, this.intervalTime);
      }
      
      stopAutoPlay() {
        if (this.timer) {
          clearInterval(this.timer);
          this.timer = null;
        }
      }
      
      pause() {
        this.stopAutoPlay();
      }
      
      resume() {
        this.startAutoPlay();
      }
      
      next() {
        const nextIndex = (this.currentIndex + 1) % this.images.length;
        this.transitionTo(nextIndex);
      }
      
      prev() {
        const prevIndex = (this.currentIndex - 1 + this.images.length) % this.images.length;
        this.transitionTo(prevIndex);
      }
      
      transitionTo(index) {
        if (index === this.currentIndex) return;
        if (this.isTransitioning) return;
        
        this.isTransitioning = true;
        const oldSlide = this.currentSlide;
        const newSlide = this.createSlideElement(this.images[index]);
        
        this.container.appendChild(newSlide);
        
        // Force reflow
        void newSlide.offsetWidth;
        
        newSlide.classList.add('active', 'ken-burns');
        
        this.currentIndex = index;
        this.currentSlide = newSlide;
        
        setTimeout(() => {
          if (oldSlide && oldSlide.parentNode === this.container) {
            this.container.removeChild(oldSlide);
          }
          this.isTransitioning = false;
        }, 1500);
      }
      
      bindEvents() {
        const bannerHalf = this.container.closest('.banner-half');
        if (!bannerHalf) return;
        
        // Mouse events
        bannerHalf.addEventListener('mousedown', (e) => this.dragStart(e.clientX));
        window.addEventListener('mousemove', (e) => this.dragMove(e.clientX));
        window.addEventListener('mouseup', () => this.dragEnd());
        
        // Touch events
        bannerHalf.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            this.dragStart(e.touches[0].clientX);
          }
        }, { passive: true });
        
        bannerHalf.addEventListener('touchmove', (e) => {
          if (e.touches.length === 1) {
            this.dragMove(e.touches[0].clientX);
          }
        }, { passive: true });
        
        bannerHalf.addEventListener('touchend', () => this.dragEnd());
      }
      
      dragStart(clientX) {
        this.startX = clientX;
        this.isDragging = true;
        this.stopAutoPlay();
      }
      
      dragMove(clientX) {
        if (!this.isDragging) return;
        this.currentX = clientX;
      }
      
      dragEnd() {
        if (!this.isDragging) return;
        this.isDragging = false;
        
        const deltaX = this.currentX - this.startX;
        
        if (this.currentX !== 0) {
          if (deltaX > this.dragThreshold) {
            this.prev();
          } else if (deltaX < -this.dragThreshold) {
            this.next();
          }
        }
        
        this.startX = 0;
        this.currentX = 0;
        
        this.startAutoPlay();
      }
    }

    const gate            = document.getElementById('gate-background');
    const mainContainer   = document.getElementById('main-container');
    const exhibitionCard  = document.getElementById('exhibition-floating-card');

    // Load resources
    const PHOTOGRAPHY_IMAGES = Array.from({ length: 29 }, (_, i) => `assets/photography/reujy_photography_${i}.jpg`);
    const VISUALIZING_IMAGES = [
      'assets/visualizing/reujy_visualizing_0____.jpg',
      'assets/visualizing/reujy_visualizing_1____.jpg',
      'assets/visualizing/reujy_visualizing_2_Feather__16x22_2018.jpg',
      'assets/visualizing/reujy_visualizing_3_Adventure_천에 아크릴_72x117cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_4___40x55cm_2024 (1).jpg',
      'assets/visualizing/reujy_visualizing_5___40x55cm_2024 (2).jpg',
      'assets/visualizing/reujy_visualizing_6___40x55cm_2025 (1).jpg',
      'assets/visualizing/reujy_visualizing_7___45x60cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_8_Candle light_사진캔버스 위에 아크릴_40x57cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_9_Parfume_종이에 립스틱_40x55cm_2025.jpg',
      'assets/visualizing/reujy_visualizing_10_Untitled_종이에 수채와 색연필__2008.jpg',
      'assets/visualizing/reujy_visualizing_11_a man_종이에 수채_16.6x25.5cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_12_a woman in move_종이에 먹과 파스텔_40x55cm_2025.jpg',
      'assets/visualizing/reujy_visualizing_13____.jpg'
    ];

    // Gate screen to landing page transition
    window.addEventListener('DOMContentLoaded', () => {
      // Init rolling banners
      const leftBanner = new RollingBanner('banner-left', PHOTOGRAPHY_IMAGES, 7000);
      const rightBanner = new RollingBanner('banner-right', VISUALIZING_IMAGES, 7000);

      setTimeout(() => {
        gate.classList.add('fade-out');
        document.body.classList.add('loaded');
        
        setTimeout(() => {
          mainContainer.setAttribute('aria-hidden', 'false');
          mainContainer.classList.add('visible');
          exhibitionCard.classList.add('revealed');
        }, 800);
      }, 2500);

      /* 1. 날짜 기준 내림차순 정렬 */
      const latestNote = [...NOTES].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
      
      /* 2. index.html의 '두 번째 영역'에 데이터 삽입 */
      const container = document.getElementById('latest-note-preview');
      if (container && latestNote) {
        container.innerHTML = `
          <span class="note-date">${latestNote.date}</span>
          <h3 class="note-title">${latestNote.title}</h3>
          <p class="note-excerpt">${latestNote.contentKr}</p>
          <a href="notes.html?id=${latestNote.id}" class="note-link">Read More</a>
        `;
      }

      // Initialize Scroll Reveal and scroll listener
      initScrollReveal();
    });

    function initScrollReveal() {
      const revealEl = document.querySelector('.scroll-reveal');
      const scrollIndicator = document.querySelector('.scroll-indicator');
      const mainContainer = document.getElementById('main-container');
      
      if (mainContainer && scrollIndicator) {
        mainContainer.addEventListener('scroll', () => {
          if (mainContainer.scrollTop > 50) {
            scrollIndicator.classList.add('hide');
          } else {
            scrollIndicator.classList.remove('hide');
          }
        });
      }

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      if (revealEl) observer.observe(revealEl);
    }
  </script>
