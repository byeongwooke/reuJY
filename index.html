<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>@reu_JY — 류지영 작가 | 표상의 여백</title>
  <meta name="description" content="작가 류지영의 공간 — 표상의 여백(The Infinite Representation). @reu_JY" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles/main.css" />
  <link rel="stylesheet" href="assets/styles/home.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       GATE (대문) — Minimalist Loading Screen
       ══════════════════════════════════════════ -->
  <div id="gate-background">
    <div class="gate-content">
      <h1 id="instagram-handle">@reu_JY</h1>
    </div>
  </div>

  <!-- ── FIXED LOGO ONLY (Zero Noise Header) ── -->
  <a id="main-artist-name" href="./index.html">REU JY | 류지영</a>

  <!-- ══════════════════════════════════════════
       ONE-SCREEN: Gonggi Scatter Space
       ══════════════════════════════════════════ -->
  <main id="scatter-intro-space">
    <!-- Pebble words launched from center by JS -->
  </main>

  <!-- ══════════════════════════════════════════
       GONGGI SCATTER ENGINE
       ══════════════════════════════════════════ -->
  <script>
    /* ─────────────────────────────────────────
       CONFIGURATION
    ───────────────────────────────────────── */
    const WORDS = [
      "Photography", "Visualizing", "Ghost", "Deja Vu",
      "Representation", "Gaze", "Void", "Texture", "Horizon", "Trace"
    ];

    /* Archive URL routing map */
    const ARCHIVE_ROUTE = {
      "Photography":    "archive.html?tab=photography",
      "Visualizing":    "archive.html?tab=visualizing",
      "Ghost":          "archive.html?category=Ghost",
      "Deja Vu":        "archive.html?category=Deja+Vu",
      "Representation": "archive.html?category=Representation",
      "Gaze":           "archive.html?category=Gaze",
      "Void":           "archive.html?category=Void",
      "Texture":        "archive.html?category=Texture",
      "Horizon":        "archive.html?category=Horizon",
      "Trace":          "archive.html?category=Trace"
    };

    const container = document.getElementById('scatter-intro-space');
    const placedElements = [];

    /* ─────────────────────────────────────────
       ROTATED BOUNDING BOX ANTI-COLLISION ENGINE
       삼각함수로 회전된 객체의 실제 절대 면적 계산
    ───────────────────────────────────────── */
    function isOverlapping(x, y, w, h) {
      const padding = 35; // 충돌 방지를 위한 절대 여백
      for (let el of placedElements) {
        if (
          x < el.x + el.w + padding &&
          x + w + padding > el.x &&
          y < el.y + el.h + padding &&
          y + h + padding > el.y
        ) {
          return true;
        }
      }
      return false;
    }

    /* ─────────────────────────────────────────
       KINETIC GONGGI SCATTER ENGINE
       공기놀이 + 랜덤 크기 & 기울기 + 삼각함수 충돌 방지
    ───────────────────────────────────────── */
    function scatterPebbles() {
      container.innerHTML = '';
      placedElements.length = 0;

      const vW = container.clientWidth;
      const vH = container.clientHeight;

      /* 공기놀이의 시작점 — 화면 정중앙 */
      const startX = vW / 2;
      const startY = vH / 2;

      WORDS.forEach((word, index) => {
        const el = document.createElement('div');
        el.className = 'pebble-word';
        el.innerText = word;
        el.setAttribute('aria-label', word + ' 카테고리 보기');

        /* 1. 랜덤 폰트 사이즈 (14px ~ 34px — 가독성을 잃지 않는 선) */
        const fontSize = Math.floor(Math.random() * 21) + 14;
        el.style.fontSize = `${fontSize}px`;

        /* 2. 랜덤 기울기 (-40° ~ +40°) */
        const rotation = Math.floor(Math.random() * 81) - 40;

        /* 초기 상태: 정중앙 집결, 투명, 기울기 0도 */
        el.style.left      = `${startX}px`;
        el.style.top       = `${startY}px`;
        el.style.transform = 'translate(-50%, -50%) scale(0.15) rotate(0deg)';
        el.style.opacity   = '0';
        el.style.color     = '#2E2E2E';
        /* JS가 호버를 직접 제어하므로 transition만 설정 */
        el.style.transition = 'opacity 0.4s ease, left 0.9s cubic-bezier(0.25, 1, 0.3, 1), top 0.9s cubic-bezier(0.25, 1, 0.3, 1), transform 0.9s cubic-bezier(0.25, 1, 0.3, 1), color 0.3s ease';

        container.appendChild(el);

        /* 실제 렌더링된 원본 크기 측정 (회전 전) */
        const elW = el.offsetWidth  || (word.length * fontSize * 0.65 + 44);
        const elH = el.offsetHeight || (fontSize + 24);

        /* 3. 삼각함수 Bounding Box 계산
              회전 시 실제로 차지하는 가로/세로 절대 면적 도출 */
        const rad  = rotation * (Math.PI / 180);
        const boxW = Math.abs(elW * Math.cos(rad)) + Math.abs(elH * Math.sin(rad));
        const boxH = Math.abs(elW * Math.sin(rad)) + Math.abs(elH * Math.cos(rad));

        /* 4. 회전된 Bounding Box 기준 충돌 방지 좌표 탐색 */
        let targetX, targetY, attempts = 0;
        do {
          targetX = Math.random() * (vW - boxW - 80) + 40;
          targetY = Math.random() * (vH - boxH - 80) + 40;
          attempts++;
        } while (isOverlapping(targetX, targetY, boxW, boxH) && attempts < 250);

        /* 회전된 Bounding Box 기준으로 배치 기록 */
        placedElements.push({ x: targetX, y: targetY, w: boxW, h: boxH });

        /* 5. 시간차 스태거: 중앙에서 각자의 좌표 + 고유 기울기로 탄력 있게 튕겨나감 */
        setTimeout(() => {
          el.style.opacity   = '1';
          el.style.left      = `${targetX}px`;
          el.style.top       = `${targetY}px`;
          el.style.transform = `translate(0, 0) scale(1) rotate(${rotation}deg)`;
        }, 50 + (index * 60));

        /* 6. JS 호버 — 고유 기울기(rotation) 유지한 채 스케일/색상만 전환 */
        el.addEventListener('mouseenter', () => {
          el.style.transform = `translate(0, -3px) scale(1.1) rotate(${rotation}deg)`;
          el.style.color     = '#8B004B';
        });
        el.addEventListener('mouseleave', () => {
          el.style.transform = `translate(0, 0) scale(1) rotate(${rotation}deg)`;
          el.style.color     = '#2E2E2E';
        });

        /* 7. 클릭 → 기울기 유지하며 사라진 후 archive.html 라우팅 */
        el.addEventListener('click', () => {
          const url = ARCHIVE_ROUTE[word] || `archive.html?category=${encodeURIComponent(word)}`;

          el.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
          el.style.opacity    = '0';
          el.style.transform  = `translate(0, -6px) scale(1.12) rotate(${rotation}deg)`;

          setTimeout(() => { window.location.href = url; }, 280);
        });
      });
    }

    /* ─────────────────────────────────────────
       LIFECYCLE
    ───────────────────────────────────────── */
    window.addEventListener('load', () => {
      const gate = document.getElementById('gate-background');

      setTimeout(() => {
        gate.classList.add('fade-out');

        /* 게이트 페이드 이후 공기놀이 시작 */
        setTimeout(() => {
          scatterPebbles();
        }, 400);
      }, 2200);
    });

    /* 리사이즈 디바운스 재계산 */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(scatterPebbles, 300);
    });
  </script>

</body>
</html>
