<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>@reu_JY — 류지영 작가 | 표상의 여백</title>
  <meta name="description" content="작가 류지영의 공간 — 표상의 여백(The Infinite Representation). @reu_JY" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles/main.css" />
  <link rel="stylesheet" href="assets/styles/home.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       GATE (대문) — Minimalist Loading Screen
       ══════════════════════════════════════════ -->
  <div id="gate-background">
    <div class="gate-content">
      <h1 id="instagram-handle">@reu_JY</h1>
    </div>
  </div>

  <!-- ── FIXED LOGO ONLY (Zero Noise Header) ── -->
  <a id="main-artist-name" href="./index.html">REU JY | 류지영</a>

  <!-- ══════════════════════════════════════════
       ONE-SCREEN: Gonggi Scatter Space
       ══════════════════════════════════════════ -->
  <main id="scatter-intro-space">
    <!-- Pebble words launched from center by JS -->
  </main>

  <!-- ══════════════════════════════════════════
       GONGGI SCATTER ENGINE
       ══════════════════════════════════════════ -->
  <script>
    /* ─────────────────────────────────────────
       CONFIGURATION & DATASET
    ───────────────────────────────────────── */
    // 4개의 고유 레터링 이미지 데이터셋 정의 (실제 폴더 내 파일명과 1:1 매칭)
    const LETTERING_PEBBLES = [
      { name: "Regard", src: "lettering/Regard.png" },
      { name: "Representation", src: "lettering/Representation.png" },
      { name: "Touch", src: "lettering/Touch.png" },
      { name: "Texture", src: "lettering/Texture.png" }
    ];

    const container = document.getElementById('scatter-intro-space');
    const placedElements = [];

    function isOverlapping(x, y, w, h, padding) {
      for (let el of placedElements) {
        if (x < el.x + el.w + padding && x + w + padding > el.x &&
            y < el.y + el.h + padding && y + h + padding > el.y) {
          return true;
        }
      }
      return false;
    }

    /* ─────────────────────────────────────────
       KINETIC IMAGE PEBBLE SCATTER ENGINE
    ───────────────────────────────────────── */
    function scatterImagePebbles() {
      container.innerHTML = '';
      placedElements.length = 0;

      const vW = container.clientWidth;
      const vH = container.clientHeight;
      const isMobile = vW <= 768;

      // 상단 아티스트 네임 헤더 절대 사수 (차폐 경계선 계산)
      const headerEl = document.getElementById('main-artist-name');
      const headerHeight = headerEl ? headerEl.getBoundingClientRect().height : 80;
      const headerSafetyMargin = isMobile ? 35 : 60;
      const headerForbiddenZone = headerHeight + headerSafetyMargin;

      // 모바일/PC 화면 비율별 최적의 환경 변수 스케일링
      const config = {
        collisionPadding: isMobile ? 15 : 40,
        safeZone: isMobile ? 25 : 90,
        baseOffset: isMobile ? 15 : 50,
        maxRotation: isMobile ? 20 : 40, // 모바일은 가독성과 면적 사수를 위해 회전각 보정
        imgWidth: isMobile ? "120px" : "220px", // 이미지 기반 폰트 가독성 보장 크기
        maxAttempts: 300
      };

      const startX = vW / 2;
      const startY = vH / 2;

      LETTERING_PEBBLES.forEach((pebble, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'pebble-word-wrapper';
        
        const img = document.createElement('img');
        img.src = pebble.src;
        img.alt = pebble.name;
        img.style.width = config.imgWidth;
        img.style.height = "auto";
        img.style.display = "block";
        img.style.pointerEvents = "none"; // 이미지 드래그 차단
        
        wrapper.appendChild(img);

        // 초기 상태: 중앙 밀집 및 물리 제어 준비
        wrapper.style.position = "absolute";
        wrapper.style.left = `${startX}px`;
        wrapper.style.top = `${startY}px`;
        wrapper.style.transform = `translate(-50%, -50%) scale(0.1) rotate(0deg)`;
        wrapper.style.opacity = '0';
        wrapper.style.cursor = 'pointer';
        wrapper.style.transition = `all 0.9s cubic-bezier(0.25, 1, 0.3, 1)`;
        
        container.appendChild(wrapper);

        // [중요] 이미지 로드가 완료되어 실제 width/height 볼륨이 확인되는 순간 좌표 배치 연산 실행
        img.onload = function() {
          const elW = wrapper.offsetWidth;
          const elH = wrapper.offsetHeight;
          
          const rotation = Math.floor(Math.random() * (config.maxRotation * 2 + 1)) - config.maxRotation;
          const rad = rotation * (Math.PI / 180);
          
          // 삼각함수 기반 회전 이미지의 절대 경계 면적(Bounding Box) 계산
          const boxW = Math.abs(elW * Math.cos(rad)) + Math.abs(elH * Math.sin(rad));
          const boxH = Math.abs(elW * Math.sin(rad)) + Math.abs(elH * Math.cos(rad));

          let targetX, targetY;
          let attempts = 0;
          let placed = false;

          do {
            targetX = Math.random() * (vW - boxW - config.safeZone) + config.baseOffset;
            // y축 계산 시 상단 헤더 차폐선(headerForbiddenZone) 하단으로 배치 강제 제한
            targetY = Math.random() * (vH - boxH - headerForbiddenZone - config.safeZone) + headerForbiddenZone;
            attempts++;

            if (!isOverlapping(targetX, targetY, boxW, boxH, config.collisionPadding)) {
              placed = true;
              placedElements.push({ x: targetX, y: targetY, w: boxW, h: boxH });
              break;
            }
          } while (attempts < config.maxAttempts);

          // 연산 공간 부족 시 강제 매칭 보정 안전장치
          if (!placed) {
            targetX = Math.random() * (vW - boxW - 40) + 20;
            targetY = Math.random() * (vH - boxH - headerForbiddenZone - 20) + headerForbiddenZone;
            placedElements.push({ x: targetX, y: targetY, w: boxW, h: boxH });
          }

          // 공기놀이 촤라락 시간차 스태거 흩뿌림 트리거
          setTimeout(() => {
            wrapper.style.left = `${targetX}px`;
            wrapper.style.top = `${targetY}px`;
            wrapper.style.transform = `translate(0, 0) scale(1) rotate(${rotation}deg)`;
            wrapper.style.opacity = '1';
          }, 80 + (index * 80));

          // PC 환경 전용 격조 높은 마젠타 시그니처 호버 연출
          wrapper.addEventListener('mouseenter', () => {
            if (!isMobile) {
              wrapper.style.transform = `translate(0, -4px) scale(1.06) rotate(${rotation}deg)`;
              wrapper.style.filter = "drop-shadow(0 4px 12px rgba(139, 0, 75, 0.15))";
            }
          });
          wrapper.addEventListener('mouseleave', () => {
            if (!isMobile) {
              wrapper.style.transform = `translate(0, 0) scale(1) rotate(${rotation}deg)`;
              wrapper.style.filter = "none";
            }
          });

          // 단일 Flow 페이지 라우팅 연동 (페이드아웃 애니메이션 추가 연출)
          wrapper.addEventListener('click', () => {
            wrapper.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
            wrapper.style.opacity = '0';
            wrapper.style.transform = `translate(0, -6px) scale(1.12) rotate(${rotation}deg)`;
            setTimeout(() => {
              window.location.href = `archive.html?category=${encodeURIComponent(pebble.name)}`;
            }, 280);
          });
        };
        
        // 혹시 캐시된 이미지일 경우를 위한 onload 강제 트리거 안전장치
        if (img.complete) img.onload();
      });
    }

    /* ─────────────────────────────────────────
       LIFECYCLE
    ───────────────────────────────────────── */
    window.addEventListener('load', () => {
      const gate = document.getElementById('gate-background');

      setTimeout(() => {
        gate.classList.add('fade-out');

        /* 게이트 페이드 이후 공기놀이 시작 */
        setTimeout(() => {
          scatterImagePebbles();
        }, 400);
      }, 2200);
    });

    /* 리사이즈 디바운스 재계산 */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(scatterImagePebbles, 300);
    });
  </script>

</body>
</html>
