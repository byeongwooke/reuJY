<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <meta name="description" content="작가 류지영의 공간 — 표상의 여백(The Infinite Representation). @reu_JY" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="assets/styles/main.css" />

<body>

  <!-- ══════════════════════════════════════════
       GATE (대문) — Minimalist Loading
       ══════════════════════════════════════════ -->
  <div id="gate-background">
    <div class="gate-content">
      <h1 id="instagram-handle">@reu_JY</h1>
    </div>
  </div>

  <!-- ── FIXED LOGO ONLY (Zero Noise Header) ── -->
  <a id="main-artist-name" href="./index.html">REU JY | 류지영</a>

  <!-- ══════════════════════════════════════════
       SINGLE FLOW LAYOUT
       ══════════════════════════════════════════ -->
  <main>
    <!-- 1. Scatter Intro Space (canvas-flow) -->
    <section id="scatter-intro-space">
      <!-- Pebble words dynamically placed here -->
    </section>

    <!-- 2. Selected Archive Space (masonry-dense) -->
    <section id="selected-archive-space">
      <div class="archive-header">
        <h2 id="current-archive-title">ARCHIVE</h2>
        <p id="current-archive-count">0 items</p>
      </div>
      <div id="selected-archive-grid">
        <!-- Masonry items populated here -->
      </div>
    </section>

    <!-- 3. Artist Story Space (serene-manifesto) -->
    <section id="artist-story-space">
      <div class="story-container">
        <div class="story-left">
          <h3>Statement</h3>
          <div class="artist-statement" id="artist-statement">Loading statement...</div>
        </div>
        <div class="story-right">
          <div class="exhibition-block">
            <h3>Solo Exhibitions</h3>
            <ul class="exhibition-list" id="solo-exhibitions-list">
              <!-- Solo exhibition items -->
            </ul>
          </div>
          <div class="exhibition-block">
            <h3>Group Exhibitions</h3>
            <ul class="exhibition-list" id="group-exhibitions-list">
              <!-- Group exhibition items -->
            </ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ══════════════════════════════════════════
       PREMIUM LIGHTBOX OVERLAY
       ══════════════════════════════════════════ -->
  <div id="lightbox-overlay" aria-hidden="true" role="dialog" aria-label="이미지 크게 보기">
    <div class="lightbox-content">
      <button id="lightbox-close" aria-label="닫기">✕</button>
      <img src="" alt="" class="lightbox-img" id="lightbox-img" />
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       INTERACTION SCRIPTS
       ══════════════════════════════════════════ -->
  <script>

    const PHOTOGRAPHY_IMAGES = Array.from({ length: 29 }, (_, i) => `assets/photography/reujy_photography_${i}.jpg`);

    const VISUALIZING_IMAGES = [

      'assets/visualizing/reujy_visualizing_1____.jpg',
      'assets/visualizing/reujy_visualizing_2_Feather__16x22_2018.jpg',
      'assets/visualizing/reujy_visualizing_3_Adventure_천에 아크릴_72x117cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_4___40x55cm_2024 (1).jpg',
      'assets/visualizing/reujy_visualizing_5___40x55cm_2024 (2).jpg',
      'assets/visualizing/reujy_visualizing_6___40x55cm_2025 (1).jpg',
      'assets/visualizing/reujy_visualizing_7___45x60cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_8_Candle light_사진캔버스 위에 아크릴_40x57cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_9_Parfume_종이에 립스틱_40x55cm_2025.jpg',
      'assets/visualizing/reujy_visualizing_10_Untitled_종이에 수채와 색연필__2008.jpg',
      'assets/visualizing/reujy_visualizing_11_a man_종이에 수채_16.6x25.5cm_2024.jpg',
      'assets/visualizing/reujy_visualizing_12_a woman in move_종이에 먹과 파스텔_40x55cm_2025.jpg',
      'assets/visualizing/reujy_visualizing_13____.jpg'
    ];

    // Aesthetic conceptual mappings linking keywords to existing images
    const CATEGORY_MAP = {
      "Photography": PHOTOGRAPHY_IMAGES,
      "Visualizing": VISUALIZING_IMAGES,
      "Ghost": [
        'assets/photography/reujy_photography_3.jpg',
        'assets/photography/reujy_photography_5.jpg',
        'assets/photography/reujy_photography_8.jpg',
        'assets/photography/reujy_photography_14.jpg',
        'assets/photography/reujy_photography_19.jpg',
        'assets/photography/reujy_photography_21.jpg',
        'assets/visualizing/reujy_visualizing_0____.jpg',
        'assets/visualizing/reujy_visualizing_1____.jpg',
        'assets/visualizing/reujy_visualizing_10_Untitled_종이에 수채와 색연필__2008.jpg'
      ],
      "Deja Vu": [
        'assets/photography/reujy_photography_0.jpg',
        'assets/photography/reujy_photography_6.jpg',
        'assets/photography/reujy_photography_12.jpg',
        'assets/photography/reujy_photography_17.jpg',
        'assets/photography/reujy_photography_24.jpg',
        'assets/photography/reujy_photography_28.jpg',
        'assets/visualizing/reujy_visualizing_2_Feather__16x22_2018.jpg',
        'assets/visualizing/reujy_visualizing_4___40x55cm_2024 (1).jpg',
        'assets/visualizing/reujy_visualizing_12_a woman in move_종이에 먹과 파스텔_40x55cm_2025.jpg'
      ],
      "Representation": [
        'assets/photography/reujy_photography_2.jpg',
        'assets/photography/reujy_photography_7.jpg',
        'assets/photography/reujy_photography_11.jpg',
        'assets/photography/reujy_photography_16.jpg',
        'assets/photography/reujy_photography_22.jpg',
        'assets/photography/reujy_photography_27.jpg',
        'assets/visualizing/reujy_visualizing_3_Adventure_천에 아크릴_72x117cm_2024.jpg',
        'assets/visualizing/reujy_visualizing_6___40x55cm_2025 (1).jpg',
        'assets/visualizing/reujy_visualizing_8_Candle light_사진캔버스 위에 아크릴_40x57cm_2024.jpg'
      ],
      "Gaze": [
        'assets/photography/reujy_photography_4.jpg',
        'assets/photography/reujy_photography_9.jpg',
        'assets/photography/reujy_photography_13.jpg',
        'assets/photography/reujy_photography_18.jpg',
        'assets/photography/reujy_photography_23.jpg',
        'assets/visualizing/reujy_visualizing_9_Parfume_종이에 립스틱_40x55cm_2025.jpg',
        'assets/visualizing/reujy_visualizing_11_a man_종이에 수채_16.6x25.5cm_2024.jpg'
      ],
      "Void": [
        'assets/photography/reujy_photography_1.jpg',
        'assets/photography/reujy_photography_10.jpg',
        'assets/photography/reujy_photography_15.jpg',
        'assets/photography/reujy_photography_20.jpg',
        'assets/photography/reujy_photography_25.jpg',
        'assets/visualizing/reujy_visualizing_5___40x55cm_2024 (2).jpg',
        'assets/visualizing/reujy_visualizing_7___45x60cm_2024.jpg',
        'assets/visualizing/reujy_visualizing_13____.jpg'
      ],
      "Texture": [
        'assets/photography/reujy_photography_26.jpg',
        'assets/photography/reujy_photography_28.jpg',
        'assets/visualizing/reujy_visualizing_2_Feather__16x22_2018.jpg',
        'assets/visualizing/reujy_visualizing_3_Adventure_천에 아크릴_72x117cm_2024.jpg',
        'assets/visualizing/reujy_visualizing_8_Candle light_사진캔버스 위에 아크릴_40x57cm_2024.jpg',
        'assets/visualizing/reujy_visualizing_9_Parfume_종이에 립스틱_40x55cm_2025.jpg',
        'assets/visualizing/reujy_visualizing_12_a woman in move_종이에 먹과 파스텔_40x55cm_2025.jpg'
      ],
      "Horizon": [
        'assets/photography/reujy_photography_1.jpg',
        'assets/photography/reujy_photography_6.jpg',
        'assets/photography/reujy_photography_12.jpg',
        'assets/photography/reujy_photography_18.jpg',
        'assets/photography/reujy_photography_24.jpg'
      ],
      "Trace": [
        'assets/photography/reujy_photography_3.jpg',
        'assets/photography/reujy_photography_11.jpg',
        'assets/photography/reujy_photography_19.jpg',
        'assets/photography/reujy_photography_27.jpg',
        'assets/visualizing/reujy_visualizing_0____.jpg',
        'assets/visualizing/reujy_visualizing_1____.jpg',
        'assets/visualizing/reujy_visualizing_6___40x55cm_2025 (1).jpg'
      ]
    };

    const container = document.getElementById('scatter-intro-space');
    const placedElements = [];

    // Helper: Debounce window actions
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // Helper: Check overlap between words
    function isOverlapping(x, y, w, h) {
      const padding = 40; // 단어 사이의 최소 안전 여백 보장
      for (let el of placedElements) {
        if (x < el.x + el.w + padding &&
            x + w + padding > el.x &&
            y < el.y + el.h + padding &&
            y + h + padding > el.y) {
          return true;
        }
      }
      return false;
    }

    // Anti-Collision Packing Engine
    function scatterPebbles() {
      container.innerHTML = '';
      placedElements.length = 0;

      const vW = container.clientWidth;
      const vH = container.clientHeight;

      WORDS.forEach((word, index) => {
        const el = document.createElement('div');
        el.className = 'pebble-word';
        el.innerText = word;
        container.appendChild(el);

        // 가상 크기 측정 (폰트 사이즈 기반 대략적 너비/높이 계산)
        const elW = el.offsetWidth || (word.length * 9 + 48);
        const elH = el.offsetHeight || 44;

        let x, y, attempts = 0;
        const maxAttempts = 150; // 좌표 탐색 한계점

        do {
          // 화면 가장자리에 너무 붙지 않도록 10%~90% 마진 바운더리 안에서 난수 생성
          x = Math.random() * (vW - elW - 100) + 50;
          y = Math.random() * (vH - elH - 100) + 50;
          attempts++;
        } while (isOverlapping(x, y, elW, elH) && attempts < maxAttempts);

        // 확정된 겹치지 않는 좌표 기록
        placedElements.push({ x, y, w: elW, h: elH });

        // 요소 스타일 실제 고정
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;

        // 웰컴 촤라락 순차적 스태거 흩뿌림 애니메이션 작동
        setTimeout(() => {
          el.style.opacity = '1';
          el.style.transform = 'scale(1) translate3d(0, 0, 0)';
        }, index * 120); // 0.12초 간격 딜레이 순차 노출

        // 클릭 시 해당 단어로 아카이브 데이터 연동 처리 인터랙션
        el.addEventListener('click', () => {
          document.getElementById('selected-archive-space').scrollIntoView({ behavior: 'smooth' });
          loadSpecificArchive(word); // 클릭된 단어 카테고리로 저장소 렌더링 함수 연동
        });
      });
    }

    // ══════════════════════════════════════════
    // SELECTED ARCHIVE ENGINE (Masonry & Captions)
    // ══════════════════════════════════════════
    const archiveGridContainer = document.getElementById('selected-archive-grid');
    const lightboxOverlay      = document.getElementById('lightbox-overlay');
    const lightboxImg          = document.getElementById('lightbox-img');
    const lightboxClose        = document.getElementById('lightbox-close');

    // High performance ResizeObserver to reflow masonry columns
    const gridResizeObserver = new ResizeObserver((entries) => {
      entries.forEach(entry => {
        resizeGridItem(entry.target);
      });
    });

    // Precision Masonry dynamic aspect-ratio resizing
    function resizeGridItem(item) {
      const img = item.querySelector('.archive-item-image');
      if (!img) return;

      const setSpan = () => {
        const rowHeight = 15;
        const rowGap = 30;
        const imgHeight = img.getBoundingClientRect().height || img.offsetHeight;
        
        if (imgHeight > 0) {
          const rowSpan = Math.ceil((imgHeight + rowGap) / (rowHeight + rowGap));
          item.style.gridRowEnd = `span ${rowSpan}`;
        }
      };

      if (img.complete) {
        setSpan();
      } else {
        img.onload = setSpan;
      }
    }

    function resizeAllGridItems() {
      const items = archiveGridContainer.querySelectorAll('.archive-item');
      items.forEach(resizeGridItem);
    }

    // Trigger stagger entrance animation for archive items
    function triggerArchiveCascade() {
      const items = archiveGridContainer.querySelectorAll('.archive-item');
      items.forEach((item, index) => {
        item.classList.remove('animate-arrival');
        void item.offsetWidth; // Force reflow
        item.style.animationDelay = `${0.05 + index * 0.05}s`;
        item.classList.add('animate-arrival');
      });
    }

    // Load dynamic categories to grid
    function loadSpecificArchive(word) {
      const titleEl = document.getElementById('current-archive-title');
      const countEl = document.getElementById('current-archive-count');
      const sectionEl = document.getElementById('selected-archive-space');
      
      // Make archive section active
      sectionEl.classList.add('visible');
      
      // Update label contents
      titleEl.innerText = word;
      
      const images = CATEGORY_MAP[word] || [];
      countEl.innerText = `${images.length} works`;
      
      // Clear container children
      archiveGridContainer.replaceChildren();
      
      // Map category label for caption styling
      const category = (word === 'Photography') ? 'photography' : 'visualizing';
      
      images.forEach((src, index) => {
        const item = document.createElement('div');
        item.className = 'archive-item';

        const img = document.createElement('img');
        img.src = src;
        img.className = 'archive-item-image';
        img.alt = `${word} - ${index + 1}`;
        img.loading = 'lazy';

        const captionText = getMuseumCaption(src, category, index);

        const caption = document.createElement('div');
        caption.className = 'archive-item-caption';
        caption.innerText = captionText;

        item.appendChild(img);
        item.appendChild(caption);

        // Lightbox trigger
        item.addEventListener('click', () => {
          lightboxImg.src = src;
          lightboxOverlay.classList.add('open');
          lightboxOverlay.setAttribute('aria-hidden', 'false');
        });

        archiveGridContainer.appendChild(item);
        
        // Observe item for masonry calculations
        gridResizeObserver.observe(item);
        resizeGridItem(item);
      });

      triggerArchiveCascade();
    }

    // Parse filename to extract description tokens
    function getMuseumCaption(src, category, index) {
      if (category === 'photography') {
        return `Photography #${String(index + 1).padStart(2, '0')}`;
      }
      
      try {
        const parts = src.split('/');
        const filename = decodeURIComponent(parts[parts.length - 1]).replace('.jpg', '');
        
        // Format: reujy_visualizing_{index}_{Title}_{Material}_{Size}_{Year}
        const tokens = filename.split('_');
        if (tokens.length >= 4) {
          const detailTokens = tokens.slice(3);
          const cleanTokens = detailTokens.map(t => t.trim()).filter(t => t !== '');
          if (cleanTokens.length > 0) {
            return cleanTokens.join(', ');
          }
        }
      } catch (e) {
        console.error("Caption parsing error:", e);
      }
      
      return `Visual Art #${String(index + 1).padStart(2, '0')}`;
    }

    // Lightbox overlays closing
    function closeLightbox() {
      lightboxOverlay.classList.remove('open');
      lightboxOverlay.setAttribute('aria-hidden', 'true');
      setTimeout(() => { lightboxImg.src = ''; }, 350);
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxOverlay.addEventListener('click', (e) => {
      if (e.target === lightboxOverlay) {
        closeLightbox();
      }
    });

    // ══════════════════════════════════════════
    // ASYNC BIOGRAPHY LOADER
    // ══════════════════════════════════════════
    function loadArtistBio() {
      fetch('data/bio.json')
        .then(res => res.json())
        .then(data => {
          document.getElementById('artist-statement').innerText = data.statement;
          
          const soloList = document.getElementById('solo-exhibitions-list');
          soloList.innerHTML = data.solo_exhibitions.map(ex => `
            <li class="exhibition-item">
              <span class="exhibition-year">${ex.year}</span>
              <span class="exhibition-details">
                <span class="exhibition-title">${ex.title}</span>, ${ex.venue}, ${ex.location}
              </span>
            </li>
          `).join('');
          
          const groupList = document.getElementById('group-exhibitions-list');
          groupList.innerHTML = data.group_exhibitions.map(ex => `
            <li class="exhibition-item">
              <span class="exhibition-year">${ex.year}</span>
              <span class="exhibition-details">
                <span class="exhibition-title">${ex.title}</span>, ${ex.venue}, ${ex.location}
              </span>
            </li>
          `).join('');
          
          document.getElementById('artist-story-space').classList.add('visible');
        })
        .catch(err => console.error("Error loading biography:", err));
    }

    // ══════════════════════════════════════════
    // LIFECYCLE EVENT CONTROLS
    // ══════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
      const gate = document.getElementById('gate-background');

      // Async fetch profile statement
      loadArtistBio();

      // Gate entrance timeout
      setTimeout(() => {
        gate.classList.add('fade-out');
        document.body.classList.add('loaded');
        
        // Trigger scatter pebble animations
        scatterPebbles();
      }, 2500);
    });

    window.addEventListener('resize', debounce(() => {
      scatterPebbles();
      resizeAllGridItems();
    }, 200));
  </script>
</body>
</html>
