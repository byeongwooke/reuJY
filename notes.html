<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Notes — @reu_JY | 류지영 작가</title>
  <meta name="description" content="표상의 여백, 지각과 인지 사이의 틈새, 그리고 질감과 잔상에 관한 류지영 작가의 철학적 노트와 에세이 기록입니다." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;600;700&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/styles/main.css" />
  <link rel="stylesheet" href="assets/styles/notes.css" />
  <script src="data/notes.js" defer></script>
</head>
<body>

  <!-- ── FIXED GLOBAL HEADER & NAV ── -->
  <a id="main-artist-name" href="./index.html">REU JY | 류지영</a>

  <nav id="top-text-nav" aria-label="메인 네비게이션">
    <a href="./archive.html">Archive</a>
    <a href="./process.html">Process</a>
    <a href="./notes.html" class="active">Notes</a>
  </nav>

  <!-- ── EXHIBITION FLOATING CARD ── -->
  <a id="exhibition-floating-card"
     href="https://www.instagram.com/p/DWsdw0KGATu/"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="전시 인스타그램 페이지로 이동">
    <span id="exhibition-text">EXHIBITION  04.19 — 05.18  |  @REU JY</span>
    <span class="exhibition-venue">beviamo espresso bar</span>
  </a>

  <!-- ══════════════════════════════════════════
       TYPOGRAPHY-FOCUSED ESSAYS
       ══════════════════════════════════════════ -->
  <main id="notes-wrapper" aria-label="작가 노트 및 에세이">
    <div id="notes-container">
      
      <!-- Notes Page Header -->
      <header class="notes-header">
        <h1 class="notes-title">작가 노트</h1>
        <p class="notes-subtitle">Philosophical Notes &amp; Thoughts</p>
      </header>

      <!-- Dynamically Rendered Notes Container -->
      <div id="render-notes"></div>

    </div>
  </main>

  <script>
    const exhibitionCard = document.getElementById('exhibition-floating-card');

    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
      setTimeout(() => {
        exhibitionCard.classList.add('revealed');
      }, 500);
      
      /* 날짜 역순 정렬 (최신 게시글 상단) */
      const sortedNotes = NOTES.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      /* 렌더링 로직 */
      render(sortedNotes);

      // Initialize Scroll Reveal for chapters
      initScrollReveal();

      // Check query parameter for specific note id
      handleRouteParam();
    });

    // Render notes dynamically from NOTES array
    function render(notes) {
      const renderContainer = document.getElementById('render-notes');
      if (!renderContainer) return;

      renderContainer.innerHTML = notes.map(note => {
        const paragraphsKr = note.contentKr.split('\n\n').map(p => `<p>${p}</p>`).join('');
        const paragraphsEn = note.contentEn.split('\n\n').map(p => `<p>${p}</p>`).join('');

        const quoteHtml = note.quote ? `
          <div class="essay-pull-quote">
            <blockquote class="quote-text">${note.quote.text}</blockquote>
            <cite class="quote-author">${note.quote.author}</cite>
          </div>
        ` : '';

        return `
          <article class="essay-chapter" id="note-${note.id}">
            <div class="note-wrapper">
              <div class="note-image-wrapper">
                <img src="${note.image}" class="note-image" alt="${note.title}" loading="lazy" />
              </div>
              <div class="note-content-wrapper">
                <div class="chapter-number">Note 0${note.id}</div>
                <h2 class="chapter-title">${note.title}</h2>
                <span class="note-date-text">${note.date}</span>
                <div class="note-content">
                  <div class="lang-kr">${paragraphsKr}</div>
                  <div class="lang-en">${paragraphsEn}</div>
                </div>
              </div>
            </div>
            ${quoteHtml}
          </article>
        `;
      }).join('');
    }

    // Check URL query parameters and scroll to matching note
    function handleRouteParam() {
      const urlParams = new URLSearchParams(window.location.search);
      const noteId = urlParams.get('id');
      if (noteId) {
        const targetElement = document.getElementById(`note-${noteId}`);
        const scrollContainer = document.getElementById('notes-wrapper');
        if (targetElement && scrollContainer) {
          // Force make it active (fade in) since we are navigating directly to it
          targetElement.classList.add('active');
          
          // Wait slightly for the page load transitions to settle before scrolling
          setTimeout(() => {
            // Smoothly scroll the notes-wrapper container to the target note
            const containerTop = scrollContainer.getBoundingClientRect().top;
            const elementTop = targetElement.getBoundingClientRect().top;
            const absoluteElementTop = scrollContainer.scrollTop + elementTop - containerTop;
            
            scrollContainer.scrollTo({
              top: absoluteElementTop - 40, // 40px padding offset
              behavior: 'smooth'
            });
            
            // Add a temporary visual highlight pulse class
            targetElement.classList.add('highlight-pulse');
            setTimeout(() => {
              targetElement.classList.remove('highlight-pulse');
            }, 2500);
          }, 600);
        }
      }
    }

    // IntersectionObserver for scroll fade-in
    function initScrollReveal() {
      const chapters = document.querySelectorAll('.essay-chapter');
      const options = {
        root: null,
        rootMargin: '0px',
        threshold: 0.15
      };

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            observer.unobserve(entry.target); // trigger animation only once
          }
        });
      }, options);

      chapters.forEach(chapter => {
        observer.observe(chapter);
      });
    }
  </script>
</body>
</html>
